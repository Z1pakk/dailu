<section class="faq-section">
  <div class="faq-inner section-inner">
    <div class="faq-left reveal">
      <p-tag class="section-label" [rounded]="true" value="Questions" />
      <h2 class="section-title faq-heading">Anything<br>unclear?</h2>
      <p class="faq-sub">Can't find the answer? Reach out directly.</p>
      <a href="mailto:vladshumskiyy@gmail.com" class="faq-link">vladshumskiyy@gmail.com →</a>
    </div>
    <div class="faq-list reveal">
      @for (item of items; track item.q; let i = $index) {
        <div class="faq-item" [class.open]="$openIndex() === i">
          <button class="faq-question" (click)="toggle(i)">
            <span>{{ item.q }}</span>
            <span class="faq-icon">+</span>
          </button>
          <div class="faq-answer">
            <div class="faq-answer-inner">{{ item.a }}</div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
