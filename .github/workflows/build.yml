name: Build & Test

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.x"
  NODE_VERSION: "22"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write

    defaults:
      run:
        working-directory: Dailo

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          
      - name: Set up dependency caching
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Dailo.slnx

      - name: Build
        run: dotnet build Dailo.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Dailo.slnx --configuration Release --no-restore --no-build

      - name: Publish
        run: dotnet publish Dailo.slnx --configuration Release --no-restore --no-build

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Dailo/Dailo.ClientApp

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v5
        id: node-cache
        with:
          path: Dailo/Dailo.ClientApp/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('Dailo/Dailo.ClientApp/package-lock.json') }}

      - name: Cache Angular build cache
        uses: actions/cache@v5
        with:
          path: Dailo/Dailo.ClientApp/.angular/cache
          key: ${{ runner.os }}-angular-${{ hashFiles('Dailo/Dailo.ClientApp/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-angular-

      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build
        run: npm run build
