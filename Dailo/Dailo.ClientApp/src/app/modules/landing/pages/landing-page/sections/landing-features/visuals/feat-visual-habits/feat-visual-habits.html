<div class="habits-card">
  <div class="habits-title">Morning run</div>
  <div class="habits-tags">
    <p-tag value="strava" [rounded]="true" />
    <p-tag value="5km" [rounded]="true" severity="secondary" />
  </div>
  <div class="habits-meta">3 × weekly · milestone: 50/100</div>
  <div class="habits-progress">
    <div class="habits-bar"></div>
  </div>
  <div class="habits-footer">
    <span>Last: today</span>
    <span>50% to milestone</span>
  </div>
</div>
