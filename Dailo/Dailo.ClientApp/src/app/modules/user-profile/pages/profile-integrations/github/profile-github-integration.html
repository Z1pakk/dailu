@if ($isLoading()) {
  <div class="self-stretch flex items-center justify-center py-12">
    <i class="pi pi-spin pi-spinner text-2xl text-surface-400"></i>
  </div>
} @else if ($showConnected()) {
  <app-github-connected-card (updateClicked)="startEditing()" />
  <app-github-profile-card />
} @else {
  <app-github-token-form (saved)="stopEditing()" (cancelled)="stopEditing()" />
}
