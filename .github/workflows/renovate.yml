name: Renovate
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  renovate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for existing open dependency PRs
        id: check-prs
        run: |
          count=$(gh pr list --label "dependencies" --state open --json number --jq 'length')
          echo "count=$count" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.RENOVATE_TOKEN }}

      - name: Setup node
        if: steps.check-prs.outputs.count == '0'
        uses: actions/setup-node@v6

      - name: Renovate
        if: steps.check-prs.outputs.count == '0'
        uses: renovatebot/github-action@v46.1.15
        with:
          configurationFile: .github/renovate-global.json
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: debug
