<div class="stats-bar bg-slate-900">
  <div class="stats-bar-inner section-inner">
    @for (stat of stats; track stat.label; let last = $last) {
      <div class="stats-item">
        <span #counter
              [class.stats-number-blue]="stat.blue"
              [attr.data-target]="stat.target"
              [attr.data-suffix]="stat.suffix"
              class="stats-number">
          0
        </span>
        <span class="stats-label">{{ stat.label }}</span>
      </div>
      @if (!last) {
        <div class="stats-divider"></div>
      }
    }
    <span class="btn-glow">
      @if ($isAuthenticated()) {
        <a routerLink="/app" class="stats-cta" pButton>Go to App →</a>
      }
      @else {
        <a routerLink="/register" class="stats-cta" pButton>Start for free →</a>
      }
    </span>
  </div>
</div>
