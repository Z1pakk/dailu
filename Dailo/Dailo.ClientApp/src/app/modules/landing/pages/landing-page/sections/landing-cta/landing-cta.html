<section class="cta-section">
  <div class="section-inner reveal">
    <h2 class="cta-title">Ready to start tracking?</h2>
    <p class="cta-sub">
      Free to use. No credit card required. Connect your apps in under a minute.
    </p>
    <div class="cta-actions">
      @if ($isAuthenticated()) {
        <span class="btn-glow">
          <a routerLink="/app" class="cta-btn-primary" pButton>Go to App →</a>
        </span>
      }
      @else {
        <span class="btn-glow">
          <a routerLink="/register" class="cta-btn-primary" pButton>
            Start tracking free →
          </a>
        </span>
        <a routerLink="/login"
           severity="secondary"
           class="cta-btn-secondary"
           pButton>
          Sign in
        </a>
      }
    </div>
  </div>
</section>
