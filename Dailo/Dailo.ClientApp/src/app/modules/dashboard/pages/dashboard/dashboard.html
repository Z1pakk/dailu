<div class="grid grid-cols-3 gap-6 items-start">
  <div class="flex flex-col gap-6">
    <app-activity-heatmap [habitEntries]="$habitEntries()" />
    <app-quick-entries />
  </div>

  <div class="col-span-2 border border-(--surface-border) rounded-xl p-6 shadow-sm">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-xl font-semibold">Recent Activity</h2>
      <a routerLink="/app/entries" class="text-sm text-surface-500 hover:text-surface-700 transition-colors">
        View all
      </a>
    </div>

    @if ($isLoading()) {
      <div class="flex flex-col gap-3">
        @for (_ of [1, 2, 3]; track $index) {
          <div class="h-16 rounded-lg bg-zinc-100 dark:bg-zinc-800 animate-pulse"></div>
        }
      </div>
    } @else if ($recentEntries().length === 0) {
      <p class="text-surface-500 text-sm py-6 text-center">No entries yet. Start tracking your habits!</p>
    } @else {
      <div class="flex flex-col gap-3">
        @for (entry of $recentEntries(); track entry.id) {
          <app-habit-entry-list-item [habitEntry]="entry" />
        }
      </div>
    }
  </div>
</div>
