name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  DOTNET_VERSION: "10.x"

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Dailo

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true

      - name: Restore
        run: dotnet restore Dailo.slnx

      - name: Build
        run: dotnet build Dailo.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Dailo.slnx --configuration Release --no-restore --no-build

      - name: Publish
        run: dotnet publish Dailo.slnx --configuration Release --no-restore --no-build